# 数据源配置 - 使用 HikariCP 连接池
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/mingsha_template_vue?autoReconnect=true&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai
    username: ENC(Wy4N2XOrGvpA8c2XnGlG3g==)
    password: ENC(i6tDjChEIlFuN00qAgtp6g==)
    type: com.zaxxer.hikari.HikariDataSource
    # HikariCP 连接池配置
    hikari:
      # 连接池名称
      pool-name: MingshaHikariPool
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接数
      maximum-pool-size: 20
      # 连接最大存活时间（毫秒），0表示无限
      max-lifetime: 900000
      # 连接超时时间（毫秒）
      connection-timeout: 30000
      # 空闲超时时间（毫秒）
      idle-timeout: 600000
      # 连接测试查询
      connection-test-query: SELECT 1

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: site.mingsha.dal.**.model
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*DAO.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml
